<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard | Modern Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            min-height: 100vh;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .info-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .info-card:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(59, 130, 246, 0.4);
            transform: translateY(-2px);
        }

        .course-tag {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(37, 99, 235, 0.2));
            border: 1px solid rgba(59, 130, 246, 0.3);
        }
    </style>
</head>
<body class="text-slate-200 p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <div class="flex flex-col items-center mb-12 animate-in fade-in zoom-in duration-700">
            <div class="bg-blue-600/20 p-4 rounded-2xl mb-4 border border-blue-500/30">
                <i class="fas fa-graduation-cap text-4xl text-blue-400"></i>
            </div>
            <h1 class="text-3xl md:text-4xl font-extrabold text-white tracking-tight">Student Dashboard</h1>
            <p class="text-slate-400 mt-2">Welcome back to your academic portal</p>
        </div>

        <div class="grid grid-cols-1 gap-8">
            
            <div class="glass-panel rounded-3xl p-8 shadow-2xl">
                <div class="flex items-center gap-3 mb-8">
                    <i class="fas fa-id-card text-blue-400"></i>
                    <h2 class="text-xl font-bold text-white">Personal Information</h2>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="info-card p-6 rounded-2xl">
                        <p class="text-xs font-semibold text-blue-400 uppercase tracking-widest mb-1">Full Name</p>
                        <p id="name" class="text-lg font-bold text-slate-100">Loading...</p>
                    </div>
                    <div class="info-card p-6 rounded-2xl">
                        <p class="text-xs font-semibold text-blue-400 uppercase tracking-widest mb-1">Email Address</p>
                        <p id="email" class="text-lg font-bold text-slate-100 truncate">Loading...</p>
                    </div>
                    <div class="info-card p-6 rounded-2xl">
                        <p class="text-xs font-semibold text-blue-400 uppercase tracking-widest mb-1">Department</p>
                        <p id="dept" class="text-lg font-bold text-slate-100">Loading...</p>
                    </div>
                </div>
            </div>

            <div class="glass-panel rounded-3xl p-8 shadow-2xl">
                <div class="flex items-center gap-3 mb-8">
                    <i class="fas fa-book-open text-blue-400"></i>
                    <h2 class="text-xl font-bold text-white">Enrolled Courses</h2>
                </div>
                
                <div id="list" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                    <div class="col-span-full text-center py-10 text-slate-500 italic">
                        Searching for your courses...
                    </div>
                </div>
            </div>

            <div class="flex justify-center pt-4">
                <button onclick="logout()" class="group flex items-center gap-3 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white px-10 py-4 rounded-2xl font-bold shadow-lg shadow-blue-900/20 transition-all active:scale-95">
                    <i class="fas fa-sign-out-alt group-hover:-translate-x-1 transition-transform"></i>
                    Sign Out From Portal
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- INTERNAL LOGIC (UNCHANGED) ---
        const BASE_URL = "http://localhost:8080";
        const nameEl = document.getElementById("name");
        const emailEl = document.getElementById("email");
        const deptEl = document.getElementById("dept");
        const listEl = document.getElementById("list");

        async function load() {
            const savedEmail = localStorage.getItem("email");

            if (!savedEmail) {
                window.location.href = "login.html";
                return;
            }

            try {
                const res = await fetch(`${BASE_URL}/students/my?email=${savedEmail}`);
                if (!res.ok) throw new Error("No student linked to this account");

                const student = await res.json();

                nameEl.innerText = student.name;
                emailEl.innerText = student.email;
                deptEl.innerText = student.department;

                listEl.innerHTML = "";

                if (student.courses && student.courses.length > 0) {
                    student.courses.forEach(c => {
                        const div = document.createElement("div");
                        div.className = "course-tag p-5 rounded-2xl flex items-center gap-4 transition-all hover:bg-blue-500/10";
                        div.innerHTML = `
                            <div class="h-10 w-10 rounded-xl bg-blue-500/20 flex items-center justify-center text-blue-400">
                                <i class="fas fa-bookmark"></i>
                            </div>
                            <span class="font-semibold text-slate-200">${c.title}</span>
                        `;
                        listEl.appendChild(div);
                    });
                } else {
                    listEl.innerHTML = `
                        <div class="col-span-full bg-slate-800/40 border border-dashed border-slate-700 p-8 rounded-2xl text-center text-slate-500">
                            No courses enrolled yet.
                        </div>`;
                }

            } catch (err) {
                alert("❌ Error: " + err.message);
            }
        }

        function logout() {
            localStorage.removeItem("email");
            window.location.href = "login.html";
        }

        load();
    </script>
</body>
</html>
