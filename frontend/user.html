<!DOCTYPE html>
<html>
<head>
  <title>User Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen p-10">

<h1 class="text-3xl text-center mb-8">🎓 My Dashboard</h1>

<div class="bg-white p-6 rounded shadow mb-6 max-w-xl mx-auto">
  <h2 class="text-xl mb-3">My Info</h2>

  <p><b>Name:</b> <span id="name"></span></p>
  <p><b>Email:</b> <span id="email"></span></p>
  <p><b>Department:</b> <span id="dept"></span></p>
</div>

<div class="bg-white p-6 rounded shadow max-w-xl mx-auto">
  <h2 class="text-xl mb-3">My Courses</h2>
  <ul id="list"></ul>
</div>

<div class="text-center mt-6">
  <button onclick="logout()" class="bg-red-500 text-white px-6 py-2 rounded">
    Logout
  </button>
</div>

<script>
const BASE_URL = "http://localhost:8080";
const nameEl = document.getElementById("name");
const emailEl = document.getElementById("email");
const deptEl = document.getElementById("dept");
const listEl = document.getElementById("list");

async function load() {

  const savedEmail = localStorage.getItem("email");

  if (!savedEmail) {
    window.location.href = "login.html";
    return;
  }

  try {
    const res = await fetch(`${BASE_URL}/students/my?email=${savedEmail}`);

    if (!res.ok) throw new Error("No student linked");

    const student = await res.json();

    nameEl.innerText = student.name;
    emailEl.innerText = student.email;
    deptEl.innerText = student.department;

    listEl.innerHTML = "";

    if (student.courses && student.courses.length > 0) {
      student.courses.forEach(c => {
        const li = document.createElement("li");
        li.innerText = c.title;
        listEl.appendChild(li);
      });
    } else {
      listEl.innerHTML = "<li>No courses</li>";
    }

  } catch (err) {
    alert("❌ " + err.message);
  }
}

function logout() {
  localStorage.removeItem("email");
  window.location.href = "login.html";
}

load();
</script>

</body>
</html>
