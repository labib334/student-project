<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student System | Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: #0f172a;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0;
    overflow: hidden;
  }

  .blob {
    position: absolute;
    width: 500px;
    height: 500px;
    background: linear-gradient(135deg, rgba(37, 99, 235, 0.3) 0%, rgba(147, 51, 234, 0.3) 100%);
    filter: blur(80px);
    border-radius: 50%;
    z-index: -1;
    animation: move 25s infinite alternate;
  }

  @keyframes move {
    from { transform: translate(-10%, -10%); }
    to { transform: translate(10%, 10%); }
  }

  .glass {
    background: rgba(30, 41, 59, 0.7);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    width: 100%;
    max-width: 420px;
    border-radius: 2rem;
  }

  /* Simple Input Style - Fixed Overlap */
  .field-container {
    margin-bottom: 1.25rem;
  }

  .field-container label {
    display: block;
    font-size: 0.85rem;
    color: #94a3b8;
    margin-bottom: 0.5rem;
    margin-left: 0.25rem;
  }

  .input-style {
    width: 100%;
    padding: 12px 16px;
    background: rgba(15, 23, 42, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    color: white;
    transition: all 0.3s ease;
    outline: none;
  }

  .input-style:focus {
    border-color: #38bdf8;
    box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
  }

  .btn-primary {
    background: linear-gradient(135deg, #38bdf8 0%, #6366f1 100%);
    transition: all 0.3s ease;
    cursor: pointer;
  }

  .btn-primary:hover {
    transform: translateY(-1px);
    filter: brightness(1.1);
    box-shadow: 0 10px 20px -5px rgba(56, 189, 248, 0.4);
  }

  .tab-btn {
    transition: all 0.3s ease;
    color: #94a3b8;
  }

  .tab-btn.active-tab {
    background: rgba(255, 255, 255, 0.1);
    color: white;
  }
</style>
</head>

<body>

<div class="blob" style="top: -10%; left: -10%;"></div>
<div class="blob" style="bottom: -10%; right: -10%;"></div>

<div class="glass p-8 md:p-10 text-gray-100">
  
  <div class="text-center mb-8">
    <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-sky-500/10 mb-4">
        <i class="fas fa-graduation-cap text-3xl text-sky-400"></i>
    </div>
    <h2 class="text-2xl font-bold">Student Portal</h2>
    <p class="text-slate-400 text-sm mt-1">Access your academic dashboard</p>
  </div>

  <div class="flex p-1 mb-8 bg-black/20 rounded-xl">
    <button onclick="showLogin()" id="loginTab" class="w-1/2 py-2 rounded-lg font-semibold tab-btn active-tab">Login</button>
    <button onclick="showRegister()" id="registerTab" class="w-1/2 py-2 rounded-lg font-semibold tab-btn">Register</button>
  </div>

  <!-- LOGIN FORM -->
  <div id="loginForm" class="space-y-4">
    <div class="field-container">
      <label><i class="fas fa-envelope mr-1"></i> Email Address</label>
      <input id="lemail" class="input-style" type="email" placeholder="e.g. name@student.com">
    </div>

    <div class="field-container">
      <label><i class="fas fa-lock mr-1"></i> Password</label>
      <input id="lpass" class="input-style" type="password" placeholder="Enter your password">
    </div>

    <button onclick="login()" class="btn-primary w-full py-3 rounded-xl font-bold mt-2">
      Sign In <i class="fas fa-sign-in-alt ml-2"></i>
    </button>
  </div>

  <!-- REGISTER FORM -->
  <div id="registerForm" class="hidden space-y-4">
    <div class="field-container">
      <label><i class="fas fa-user mr-1"></i> Username</label>
      <input id="ruser" class="input-style" type="text" placeholder="Choose a username">
    </div>

    <div class="field-container">
      <label><i class="fas fa-envelope mr-1"></i> Email Address</label>
      <input id="remail" class="input-style" type="email" placeholder="e.g. student@mail.com">
    </div>

    <div class="field-container">
      <label><i class="fas fa-lock mr-1"></i> Password</label>
      <input id="rpass" class="input-style" type="password" placeholder="Create a strong password">
    </div>

    <button onclick="register()" class="btn-primary w-full py-3 rounded-xl font-bold mt-2">
      Create Account <i class="fas fa-user-plus ml-2"></i>
    </button>
  </div>

  <p id="msg" class="text-center mt-6 min-h-[20px] text-sm font-medium"></p>

</div>

<script>
const BASE_URL = "http://localhost:8080";

function showLogin() {
  document.getElementById("loginForm").classList.remove("hidden");
  document.getElementById("registerForm").classList.add("hidden");
  document.getElementById("loginTab").classList.add("active-tab");
  document.getElementById("registerTab").classList.remove("active-tab");
  document.getElementById("msg").innerText = "";
}

function showRegister() {
  document.getElementById("loginForm").classList.add("hidden");
  document.getElementById("registerForm").classList.remove("hidden");
  document.getElementById("loginTab").classList.remove("active-tab");
  document.getElementById("registerTab").classList.add("active-tab");
  document.getElementById("msg").innerText = "";
}

// Logic unchanged as requested
async function register() {
  const msg = document.getElementById("msg");
  try {
    msg.innerHTML = "Processing...";
    const res = await fetch(`${BASE_URL}/auth/register`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        username: ruser.value,
        password: rpass.value,
        email: remail.value
      })
    });
    if (!res.ok) throw new Error(await res.text());
    msg.className = "text-center mt-6 text-emerald-400";
    msg.innerText = "✅ Registered successfully";
    setTimeout(() => showLogin(), 1500);
  } catch (err) {
    msg.className = "text-center mt-6 text-rose-400";
    msg.innerText = "❌ " + err.message;
  }
}

async function login() {
  const msg = document.getElementById("msg");
  try {
    msg.innerHTML = "Authenticating...";
    const res = await fetch(`${BASE_URL}/auth/login`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        email: lemail.value,
        password: lpass.value
      })
    });
    if (!res.ok) throw new Error(await res.text());
    const user = await res.json();
    if (user.role === "ADMIN") {
      window.location.href = "admin.html";
    } else {
      localStorage.setItem("email", user.email);
      window.location.href = "user.html";
    }
  } catch (err) {
    msg.className = "text-center mt-6 text-rose-400";
    msg.innerText = "❌ " + err.message;
  }
}
</script>

</body>
</html>
