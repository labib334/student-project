<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student System</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: linear-gradient(135deg, #0f172a, #1e3a8a, #2563eb);
  background-size: 300% 300%;
  animation: gradient 10s ease infinite;
}
@keyframes gradient {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

.glass {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.15);
}

.input-group {
  position: relative;
}
.input-group input {
  width: 100%;
  padding: 12px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 10px;
  color: white;
}
.input-group label {
  position: absolute;
  left: 12px;
  top: 12px;
  color: #ddd;
  transition: 0.3s;
}
.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label {
  top: -8px;
  font-size: 12px;
  background: #0ea5e9;
  padding: 0 5px;
}

.btn {
  background: linear-gradient(135deg, #38bdf8, #6366f1);
  color: white;
}

.active-tab {
  background: linear-gradient(135deg,#38bdf8,#6366f1);
}
</style>
</head>

<body class="h-screen flex items-center justify-center">

<div class="glass p-10 rounded-3xl w-96 text-gray-100">

<h2 class="text-3xl text-center mb-6">🎓 Student System</h2>

<div class="flex mb-6 bg-white/20 rounded-xl overflow-hidden">
  <button onclick="showLogin()" id="loginTab" class="w-1/2 py-2 active-tab">Login</button>
  <button onclick="showRegister()" id="registerTab" class="w-1/2 py-2">Register</button>
</div>

<!-- LOGIN -->
<div id="loginForm">
  <div class="input-group mb-4">
    <input id="lemail" placeholder=" ">
    <label>Email</label>
  </div>

  <div class="input-group mb-5">
    <input id="lpass" type="password" placeholder=" ">
    <label>Password</label>
  </div>

  <button onclick="login()" class="btn w-full py-2 rounded">Login</button>
</div>

<!-- REGISTER -->
<div id="registerForm" class="hidden">

  <div class="input-group mb-4">
    <input id="ruser" placeholder=" ">
    <label>Username</label>
  </div>

  <div class="input-group mb-4">
    <input id="remail" placeholder=" ">
    <label>Email</label>
  </div>

  <div class="input-group mb-5">
    <input id="rpass" type="password" placeholder=" ">
    <label>Password</label>
  </div>

  <button onclick="register()" class="btn w-full py-2 rounded">Register</button>
</div>

<p id="msg" class="text-center mt-4"></p>

</div>

<script>
const BASE_URL = "http://localhost:8080";

// TAB SWITCH
function showLogin() {
  loginForm.classList.remove("hidden");
  registerForm.classList.add("hidden");
  loginTab.classList.add("active-tab");
  registerTab.classList.remove("active-tab");
}

function showRegister() {
  loginForm.classList.add("hidden");
  registerForm.classList.remove("hidden");
  loginTab.classList.remove("active-tab");
  registerTab.classList.add("active-tab");
}

// REGISTER
async function register() {
  try {
    const res = await fetch(`${BASE_URL}/auth/register`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        username: ruser.value,
        password: rpass.value,
        email: remail.value
      })
    });

    if (!res.ok) throw new Error(await res.text());

    msg.innerText = "✅ Registered successfully";
    showLogin();

  } catch (err) {
    msg.innerText = "❌ " + err.message;
  }
}

// LOGIN (EMAIL BASED)
async function login() {
  try {
    const res = await fetch(`${BASE_URL}/auth/login`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        email: lemail.value,
        password: lpass.value
      })
    });

    if (!res.ok) throw new Error(await res.text());

    const user = await res.json();

    if (user.role === "ADMIN") {
      window.location.href = "admin.html";
    } else {
      localStorage.setItem("email", user.email);
      window.location.href = "user.html";
    }

  } catch (err) {
    msg.innerText = "❌ " + err.message;
  }
}
</script>

</body>
</html>
